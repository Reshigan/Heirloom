<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Heirloom">
  <title>Heirloom — maskable PWA tile</title>
  <defs>
    <radialGradient id="mHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0a062" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#e0a062" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e0a062" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mPip" cx="42%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#f0c074"/>
      <stop offset="100%" stop-color="#e0a062"/>
    </radialGradient>
  </defs>

  <!-- Ink bleeds to every edge -->
  <rect width="512" height="512" fill="#0b0907"/>

  <!-- Weave centred so the ember pip is at tile centre (256,256), entirely inside
       the inner 80% safe circle (r=204.8). Warps at x = 216, 256, 296; wefts at
       y = 218, 294. Strokes scaled to the 512 tile. -->
  <!-- Outer warps (under) -->
  <g stroke="#f2e6d0" stroke-width="22" stroke-linecap="round" fill="none">
    <line x1="216" y1="180" x2="216" y2="332"/>
    <line x1="296" y1="180" x2="296" y2="332"/>
  </g>

  <!-- Wefts in interlacing segments, gap across centre warp (x=256) -->
  <g stroke="#f2e6d0" stroke-width="22" stroke-linecap="round" fill="none">
    <line x1="194" y1="218" x2="244" y2="218"/>
    <line x1="268" y1="218" x2="318" y2="218"/>
    <line x1="194" y1="294" x2="244" y2="294"/>
    <line x1="268" y1="294" x2="318" y2="294"/>
  </g>

  <!-- Centre warp (over) -->
  <line x1="256" y1="180" x2="256" y2="332" stroke="#f2e6d0" stroke-width="22" stroke-linecap="round"/>

  <!-- Ember knot at tile centre -->
  <circle cx="256" cy="256" r="92" fill="url(#mHalo)"/>
  <circle cx="256" cy="256" r="28" fill="url(#mPip)"/>
</svg>
