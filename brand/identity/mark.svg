<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192" role="img" aria-label="Heirloom">
  <title>Heirloom — Warp-and-Weft mark</title>
  <defs>
    <radialGradient id="emberHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0a062" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#e0a062" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e0a062" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emberPip" cx="42%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#f0c074"/>
      <stop offset="100%" stop-color="#e0a062"/>
    </radialGradient>
  </defs>

  <!-- Ground -->
  <rect width="192" height="192" fill="#0b0907"/>

  <!-- Outer warps pass UNDER the wefts: drawn first -->
  <g stroke="#f2e6d0" stroke-width="9.6" stroke-linecap="round" fill="none">
    <line x1="64" y1="28" x2="64" y2="164"/>
    <line x1="128" y1="28" x2="128" y2="164"/>
  </g>

  <!-- Wefts: each is two segments with a gap across the centre warp (x=96),
       drawn OVER the outer warps but BEFORE the centre warp -->
  <g stroke="#f2e6d0" stroke-width="9.6" stroke-linecap="round" fill="none">
    <line x1="44" y1="72" x2="88" y2="72"/>
    <line x1="104" y1="72" x2="148" y2="72"/>
    <line x1="44" y1="120" x2="88" y2="120"/>
    <line x1="104" y1="120" x2="148" y2="120"/>
  </g>

  <!-- Centre warp passes OVER both wefts: drawn last -->
  <line x1="96" y1="28" x2="96" y2="164" stroke="#f2e6d0" stroke-width="9.6" stroke-linecap="round"/>

  <!-- The ember knot at the held centre (96,96) -->
  <circle cx="96" cy="96" r="40" fill="url(#emberHalo)"/>
  <circle cx="96" cy="96" r="12" fill="url(#emberPip)"/>
</svg>
