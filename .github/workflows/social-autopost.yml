name: Social autopost

# Daily autonomous content engine.
# See marketing/PLAYBOOK.md and marketing/automation/README.md.
#
# Triggers:
#   - always-on at 13:00 / 21:00 UTC — two posts every day, year-round
#     (≈9am and 5pm ET).
#   - seasonal  at 17:00 UTC — fires only inside the four peak windows
#     (Mother's/Father's/Grandparents/Christmas); run.ts no-ops the
#     seasonal-only slot outside a window.
#   - manual: workflow_dispatch with optional `mode` input
#
# Net cadence: TWO posts a day year-round, THREE a day during the seasonal
# peaks. The account has near-zero followers — volume buys nothing; distinct,
# shareable pieces at a calm cadence read as a person, six a day reads as a bot.

on:
  schedule:
    # Always-on posts — every day, twice: 13:00 ≈ 9am ET (US morning + UK
    # afternoon), 23:00 ≈ 7pm ET (US evening prime — the demographic's biggest
    # Facebook/Pinterest block — plus 9am AEST Australia morning).
    # ALWAYS_ON_HOURS in run.ts must match these hours.
    - cron: "0 13 * * *"  # ≈ 9am ET
    - cron: "0 23 * * *"  # ≈ 7pm ET
    # Seasonal-only midday slot — fires daily but run.ts no-ops it outside a
    # peak window.
    - cron: "0 17 * * *"  # ≈ 1pm ET, seasonal
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        required: true
        default: preview
        options:
          - preview
          - daily
          - metrics
          - purge
          - update-profile

concurrency:
  group: social-autopost
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: marketing/automation/package.json

      - name: Install
        working-directory: marketing/automation
        run: npm install --no-audit --no-fund

      - name: Run
        working-directory: marketing/automation
        env:
          # Generation provider. Cloudflare Workers AI (free tier) is preferred
          # when its creds are present; Anthropic is the fallback. The token must
          # have the "Workers AI" permission — the Pages deploy token may not, so
          # use a dedicated AI token. Force a provider with GEN_PROVIDER.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AI_MODEL: ${{ vars.CLOUDFLARE_AI_MODEL }}
          GEN_PROVIDER: ${{ vars.GEN_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ vars.META_PAGE_ID }}
          META_IG_USER_ID: ${{ vars.META_IG_USER_ID }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ vars.LINKEDIN_AUTHOR_URN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ vars.PINTEREST_BOARD_ID }}
          BLUESKY_HANDLE: ${{ vars.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          QUEUE_WEBHOOK_URL: ${{ secrets.QUEUE_WEBHOOK_URL }}
          # Layer B → Layer A handoff. When set, the daily generator POSTs
          # variants to the worker queue, which Postiz then publishes. See
          # marketing/PLAYBOOK.md §4.
          HEIRLOOM_API_URL: ${{ vars.HEIRLOOM_API_URL || 'https://api.heirloom.blue' }}
          # NOTE: leave HEIRLOOM_ADMIN_TOKEN UNSET. Setting it switches post()
          # into the Postiz worker-queue path (imageUrl only) and disables the
          # direct weave-bytes upload to Facebook/Bluesky.
          HEIRLOOM_ADMIN_TOKEN: ${{ secrets.HEIRLOOM_ADMIN_TOKEN }}
          # Long-lived shared secret so the freshly-rendered weave image uploads
          # to R2 and is served by public URL. Without it uploadWeave() returns
          # null and the URL-only platforms (Pinterest/Instagram/LinkedIn) post
          # the OLD static brand card instead of the new woven saying image.
          # Must equal the worker's SOCIAL_UPLOAD_TOKEN secret. Facebook/Bluesky
          # already get the weave via direct byte upload regardless of this.
          SOCIAL_UPLOAD_TOKEN: ${{ secrets.SOCIAL_UPLOAD_TOKEN }}
          # Direct-posting strategy (no Postiz): the five platforms with free
          # publishing APIs. tiktok/x/threads/youtube have no free API — add
          # them back to generate manual-paste queue files if wanted.
          PLATFORMS: ${{ vars.PLATFORMS || 'bluesky,facebook,linkedin,instagram,pinterest' }}
          SOCIAL_IMAGE_URL: ${{ vars.SOCIAL_IMAGE_URL }}
        run: npm run ${{ github.event.inputs.mode || 'daily' }}

      - name: Commit output
        if: github.event.inputs.mode != 'metrics'
        run: |
          git config user.name "heirloom-autopost[bot]"
          git config user.email "noreply@heirloom.blue"
          git add marketing/automation/output || true
          # output/ is gitignored, but the per-day ledger MUST persist across the
          # day's separate cron jobs so each slot avoids what earlier slots already
          # posted (same-day distinctness). The concurrency group serializes these
          # jobs, so each checkout already sees prior ledger commits — we only need
          # to force-add the ledger past the ignore so this slot's entry is saved.
          git add -f marketing/automation/output/*/ledger.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore(autopost): $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true
