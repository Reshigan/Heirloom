name: Social promo launch

# One-shot promotional campaign:
#  - Updates profile pictures (Bluesky + Facebook Page)
#  - Posts THREAD30 promo thread on Bluesky (3 posts)
#  - Posts promo on Facebook (with image + link-in-comment)
#  - Posts promo on Instagram (container → publish)
#  - Pins promo on Pinterest

on:
  workflow_dispatch:

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: marketing/automation/package.json

      - name: Install
        working-directory: marketing/automation
        run: npm install --no-audit --no-fund

      - name: Launch promo across all platforms
        working-directory: marketing/automation
        env:
          BLUESKY_HANDLE:          ${{ vars.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD:    ${{ secrets.BLUESKY_APP_PASSWORD }}
          META_PAGE_ACCESS_TOKEN:  ${{ secrets.META_ACCESS_TOKEN }}
          META_PAGE_ID:            ${{ vars.META_PAGE_ID }}
          META_IG_USER_ID:         ${{ vars.META_IG_USER_ID }}
          PINTEREST_ACCESS_TOKEN:  ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID:      ${{ vars.PINTEREST_BOARD_ID }}
        run: npx tsx scripts/social-launch.ts

      - name: Commit output
        run: |
          git config user.name "heirloom-autopost[bot]"
          git config user.email "noreply@heirloom.blue"
          git add marketing/automation/output || true
          git diff --staged --quiet || git commit -m "chore(promo): THREAD30 launch $(date -u +%Y-%m-%d)"
          git push || true
