name: Deploy to Cloudflare

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ACTIVE source tree: /cloudflare/frontend.
  # /frontend holds the in-progress redesign (Family Thread, Hearth,
  # Tapestry, Sanctuary composer, Founder pledge UI). It is NOT
  # deployed currently — kept in the repo as the working surface for
  # the design engagement (see DESIGN_BRIEF.md, ART_DIRECTION.md).
  # When the designer ships and we cut over, switch this back.
  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudflare/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages deploy dist \
            --project-name=heirloom \
            --branch=main \
            --commit-dirty=true

  # The worker is configured by /cloudflare/wrangler.toml (name=heirloom-api,
  # the worker actually routed to api.heirloom.blue). The /wrangler.jsonc at
  # the repo root was a leftover from an earlier project structure
  # (name=heirloom-worker, which is NOT routed to anything) and was
  # interfering with config discovery — removed in this commit.
  deploy-worker:
    name: Deploy Worker to Cloudflare Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudflare/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 deploy

      # Web Push signing key → Worker secret (never committed). Skips cleanly when the
      # GH secret is unset, so deploys never fail if web push isn't configured.
      - name: Sync VAPID private key secret
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          if [ -z "$VAPID_PRIVATE_KEY" ]; then
            echo "VAPID_PRIVATE_KEY secret not set — skipping web-push key sync."
            exit 0
          fi
          printf '%s' "$VAPID_PRIVATE_KEY" | npx --yes wrangler@4 secret put VAPID_PRIVATE_KEY

      # At-rest encryption master key → Worker secret (never committed). While this
      # GH secret is unset, the worker leaves memory-description encryption DORMANT
      # (writes stay plaintext, reads pass through) — so deploys never fail and the
      # feature is opt-in. Once set, the worker encrypts new descriptions and the
      # daily `legacy-encryption-backfill` cron seals pre-existing rows.
      # ⚠️ CUSTODY: if this key is ever lost, every encrypted description becomes
      # unrecoverable. Store it durably (password manager + offline backup) BEFORE
      # adding the GH secret. Rotation requires decrypt-with-old → re-encrypt-with-new.
      - name: Sync at-rest encryption master key secret
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ENCRYPTION_MASTER_KEY: ${{ secrets.ENCRYPTION_MASTER_KEY }}
        run: |
          if [ -z "$ENCRYPTION_MASTER_KEY" ]; then
            echo "ENCRYPTION_MASTER_KEY secret not set — encryption stays dormant; skipping."
            exit 0
          fi
          printf '%s' "$ENCRYPTION_MASTER_KEY" | npx --yes wrangler@4 secret put ENCRYPTION_MASTER_KEY

  deploy-migrations:
    name: Run D1 Migrations
    runs-on: ubuntu-latest
    needs: [deploy-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply D1 migrations
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Applying D1 migrations…"
          npx --yes wrangler@4 d1 migrations apply heirloom-db --remote
