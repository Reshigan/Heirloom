name: Deploy to Cloudflare

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # The active source tree is /frontend (Family Thread, Phase 11 sculpt).
  # /cloudflare/frontend is the prior tree, kept on disk for diff/rollback
  # but no longer deployed. The Pages project "heirloom" is bound to
  # heirloom.blue.
  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages deploy dist \
            --project-name=heirloom \
            --branch=main \
            --commit-dirty=true

  # The worker is configured by /cloudflare/wrangler.toml (name=heirloom-api,
  # the worker actually routed to api.heirloom.blue). The /wrangler.jsonc at
  # the repo root was a leftover from an earlier project structure
  # (name=heirloom-worker, which is NOT routed to anything) and was
  # interfering with config discovery — removed in this commit.
  deploy-worker:
    name: Deploy Worker to Cloudflare Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudflare/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 deploy

  deploy-migrations:
    name: Run D1 Migrations
    runs-on: ubuntu-latest
    needs: [deploy-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply D1 migrations
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Applying D1 migrations…"
          npx --yes wrangler@4 d1 migrations apply heirloom-db --remote
