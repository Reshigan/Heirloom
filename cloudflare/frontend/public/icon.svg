<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Cosmic Loom mark — the rich, scalable "any" glyph. A web of bone
       filaments converging on the one warm node. -->
  <rect width="192" height="192" fill="#0e0e0c"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cf935a" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#b07a4a" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#b07a4a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Fourteen filaments, chords through the node, varied length + opacity. -->
  <g stroke="#f4ecd8" stroke-width="1.3" stroke-linecap="round" fill="none">
    <line x1="96" y1="56" x2="96"  y2="136" opacity="0.30" transform="rotate(5 96 96)"/>
    <line x1="96" y1="58" x2="96"  y2="134" opacity="0.42" transform="rotate(31 96 96)"/>
    <line x1="96" y1="54" x2="96"  y2="138" opacity="0.26" transform="rotate(57 96 96)"/>
    <line x1="96" y1="60" x2="96"  y2="132" opacity="0.50" transform="rotate(83 96 96)"/>
    <line x1="96" y1="55" x2="96"  y2="137" opacity="0.34" transform="rotate(108 96 96)"/>
    <line x1="96" y1="59" x2="96"  y2="133" opacity="0.28" transform="rotate(133 96 96)"/>
    <line x1="96" y1="56" x2="96"  y2="136" opacity="0.46" transform="rotate(162 96 96)"/>
    <line x1="96" y1="61" x2="96"  y2="131" opacity="0.30" transform="rotate(187 96 96)"/>
    <line x1="96" y1="55" x2="96"  y2="137" opacity="0.40" transform="rotate(216 96 96)"/>
    <line x1="96" y1="58" x2="96"  y2="134" opacity="0.24" transform="rotate(243 96 96)"/>
    <line x1="96" y1="54" x2="96"  y2="138" opacity="0.48" transform="rotate(270 96 96)"/>
    <line x1="96" y1="60" x2="96"  y2="132" opacity="0.30" transform="rotate(295 96 96)"/>
    <line x1="96" y1="56" x2="96"  y2="136" opacity="0.38" transform="rotate(324 96 96)"/>
    <line x1="96" y1="59" x2="96"  y2="133" opacity="0.26" transform="rotate(346 96 96)"/>
  </g>
  <!-- The convergence node — glow halo, warm core, bright pip. -->
  <circle cx="96" cy="96" r="33" fill="url(#glow)"/>
  <circle cx="96" cy="96" r="6"  fill="#cf935a"/>
  <circle cx="96" cy="96" r="2.7" fill="#e7b884"/>
</svg>
