<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Cosmic Loom mark, refined to match the live CosmicLoom UI — a glowing
       web of bone filaments + faint cross-weave converging on one warm node. -->
  <rect width="192" height="192" fill="#0e0e0c"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e7b884" stop-opacity="0.62"/>
      <stop offset="32%"  stop-color="#cf935a" stop-opacity="0.34"/>
      <stop offset="64%"  stop-color="#b07a4a" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#b07a4a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Twelve spokes from the node to a ring — the converging filaments. -->
  <g stroke="#f4ecd8" stroke-width="1.25" stroke-linecap="round" fill="none">
    <line x1="96" y1="96" x2="138"   y2="96"    opacity="0.46"/>
    <line x1="96" y1="96" x2="132.4" y2="117"   opacity="0.28"/>
    <line x1="96" y1="96" x2="117"   y2="132.4" opacity="0.40"/>
    <line x1="96" y1="96" x2="96"    y2="138"   opacity="0.30"/>
    <line x1="96" y1="96" x2="75"    y2="132.4" opacity="0.48"/>
    <line x1="96" y1="96" x2="59.6"  y2="117"   opacity="0.26"/>
    <line x1="96" y1="96" x2="54"    y2="96"    opacity="0.44"/>
    <line x1="96" y1="96" x2="59.6"  y2="75"    opacity="0.30"/>
    <line x1="96" y1="96" x2="75"    y2="59.6"  opacity="0.42"/>
    <line x1="96" y1="96" x2="96"    y2="54"    opacity="0.28"/>
    <line x1="96" y1="96" x2="117"   y2="59.6"  opacity="0.50"/>
    <line x1="96" y1="96" x2="132.4" y2="75"    opacity="0.26"/>
  </g>
  <!-- Faint cross-weave chords between ring points — the woven mesh. -->
  <g stroke="#f4ecd8" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.14">
    <line x1="138"   y1="96"    x2="75"    y2="132.4"/>
    <line x1="75"    y1="132.4" x2="59.6"  y2="75"/>
    <line x1="59.6"  y1="75"    x2="138"   y2="96"/>
    <line x1="117"   y1="132.4" x2="54"    y2="96"/>
    <line x1="54"    y1="96"    x2="117"   y2="59.6"/>
    <line x1="117"   y1="59.6"  x2="117"   y2="132.4"/>
  </g>
  <!-- The convergence node — wide soft halo, warm core, bright pip. -->
  <circle cx="96" cy="96" r="40"  fill="url(#glow)"/>
  <circle cx="96" cy="96" r="7"   fill="#cf935a"/>
  <circle cx="96" cy="96" r="3"   fill="#e7b884"/>
</svg>
