  <text x="900"  y="50" font-family="Georgia,serif" font-size="18" fill="#b07a4a" text-anchor="middle" opacity="0.72">∞</text>
  <text x="960"  y="50" font-family="Georgia,serif" font-size="18" fill="#b07a4a" text-anchor="middle" opacity="0.72">∞</text>
  <line x1="830" y1="62" x2="830" y2="400" stroke="rgba(176,122,74,0.28)" stroke-width="1" stroke-dasharray="2,5"/>
  <line x1="900" y1="62" x2="900" y2="400" stroke="rgba(176,122,74,0.28)" stroke-width="1" stroke-dasharray="2,5"/>
  <line x1="960" y1="62" x2="960" y2="400" stroke="rgba(176,122,74,0.25)" stroke-width="1" stroke-dasharray="2,5"/>

  <!-- Year labels -->
  <text x="18"  y="1488" font-family="'Courier New',monospace" font-size="11" fill="rgba(244,236,216,0.52)">2010</text>
  <text x="264" y="1488" font-family="'Courier New',monospace" font-size="11" fill="rgba(244,236,216,0.28)">2030</text>
  <text x="514" y="1488" font-family="'Courier New',monospace" font-size="11" fill="rgba(244,236,216,0.28)">2050</text>
  <text x="714" y="1488" font-family="'Courier New',monospace" font-size="11" fill="rgba(244,236,216,0.28)">2070</text>

  <!-- Headline text panel at bottom — bone on ink -->
  <rect x="0" y="1280" width="1000" height="220" fill="#0e0e0c"/>
  <line x1="60" y1="1298" x2="940" y2="1298" stroke="rgba(244,236,216,0.12)" stroke-width="1"/>
  <text x="60" y="1340" font-family="Georgia,'Times New Roman',serif" font-size="52" font-weight="300" fill="#f4ecd8" letter-spacing="-1">Start your family's</text>
  <text x="60" y="1400" font-family="Georgia,'Times New Roman',serif" font-size="52" font-weight="300" fill="#f4ecd8" letter-spacing="-1">thousand-year thread.</text>
  <line x1="60" y1="1432" x2="940" y2="1432" stroke="rgba(244,236,216,0.12)" stroke-width="1"/>
  <text x="60"  y="1458" font-family="'Courier New',monospace" font-size="11" fill="rgba(244,236,216,0.55)" letter-spacing="4">HEIRLOOM</text>
  <text x="940" y="1458" text-anchor="end" font-family="'Courier New',monospace" font-size="11" fill="rgba(244,236,216,0.30)" letter-spacing="2">heirloom.blue</text>
  <text x="60"  y="1340" font-family="Georgia,'Times New Roman',serif" font-size="22" font-weight="300" fill="#b07a4a" dy="-56">∞</text>
</svg>
