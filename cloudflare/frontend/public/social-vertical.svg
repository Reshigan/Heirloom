    <line x1="661" y1="528" x2="913" y2="528" stroke="#3a8cc8" stroke-width="4.5"/>
    <line x1="109" y1="545" x2="300" y2="545" stroke="#2860d0" stroke-width="4.9"/>
    <line x1="382" y1="545" x2="580" y2="545" stroke="#3a8cc8" stroke-width="4.5"/>
    <line x1="759" y1="562" x2="1000" y2="562" stroke="#2860d0" stroke-width="5.0"/>
