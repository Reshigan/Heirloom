  <!-- Warm unwoven thread -->
  <path d="M700,750 C732,747 758,759 808,768" stroke="rgba(176,122,74,0.65)" stroke-width="1.6" fill="none"/>

  <!-- Frayed selvedge -->
  <line x1="700" y1="200"  x2="724" y2="196"  stroke="rgba(244,236,216,0.18)" stroke-width="0.9"/>
  <line x1="700" y1="500"  x2="722" y2="507"  stroke="rgba(244,236,216,0.14)" stroke-width="0.7"/>
  <line x1="700" y1="800"  x2="728" y2="797"  stroke="rgba(244,236,216,0.28)" stroke-width="1.0"/>
  <line x1="700" y1="1100" x2="720" y2="1108" stroke="rgba(244,236,216,0.16)" stroke-width="0.8"/>
  <line x1="700" y1="1300" x2="726" y2="1302" stroke="rgba(244,236,216,0.18)" stroke-width="0.9"/>

  <!-- Sealed ∞ pegs -->
