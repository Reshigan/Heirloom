  <!-- Band 4 — cochineal/madder -->
  <g stroke-linecap="square" opacity="1">
    <line x1="66"  y1="670" x2="288" y2="670" stroke="#c02050" stroke-width="5.0"/>
    <line x1="401" y1="687" x2="619" y2="687" stroke="#e03428" stroke-width="4.5"/>
