    <line x1="19"  y1="1107" x2="221"  y2="1107" stroke="#2860d0" stroke-width="4.9"/>
    <line x1="631" y1="1107" x2="897"  y2="1107" stroke="#3a8cc8" stroke-width="4.5"/>
    <line x1="401" y1="1124" x2="658"  y2="1124" stroke="#2860d0" stroke-width="5.0"/>
    <line x1="0"   y1="1141" x2="163"  y2="1141" stroke="#3a8cc8" stroke-width="4.9"/>
    <line x1="732" y1="1141" x2="1000" y2="1141" stroke="#2860d0" stroke-width="4.5"/>
    <line x1="234" y1="1158" x2="476"  y2="1158" stroke="#3a8cc8" stroke-width="5.0"/>
    <line x1="520" y1="1175" x2="807"  y2="1175" stroke="#2860d0" stroke-width="4.9"/>
