    <line x1="459" y1="897" x2="696" y2="897" stroke="#f4c030" stroke-width="4.5"/>
    <line x1="798" y1="897" x2="1000" y2="897" stroke="#e8a828" stroke-width="4.9"/>
    <line x1="0"   y1="914" x2="183" y2="914" stroke="#e8a828" stroke-width="4.5"/>
    <line x1="284" y1="931" x2="525" y2="931" stroke="#f4c030" stroke-width="5.0"/>
