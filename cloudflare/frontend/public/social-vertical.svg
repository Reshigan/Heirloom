    <line x1="460" y1="156" x2="709" y2="156" stroke="#e03428" stroke-width="5.0"/>
  </g>

  <!-- Band 2 — saffron/weld -->
  <g stroke-linecap="square" opacity="1">
    <line x1="474" y1="250" x2="727" y2="250" stroke="#f4c030" stroke-width="4.9"/>
    <line x1="90"  y1="267" x2="288" y2="267" stroke="#f4c030" stroke-width="4.5"/>
