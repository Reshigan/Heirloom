<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Bone background -->
  <rect width="1200" height="630" fill="#f4ecd8"/>

  <!-- Top hairline -->
  <line x1="88" y1="102" x2="1112" y2="102" stroke="#0e0e0c" stroke-width="1"/>

  <!-- ∞ mark (warm) -->
  <text x="88" y="90" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="300" fill="#b07a4a">∞</text>

  <!-- Eyebrow label -->
  <text x="118" y="87" font-family="'Courier New', monospace" font-size="10" fill="rgba(14,14,12,0.45)" letter-spacing="4.5">FAMILY THREAD</text>

  <!-- Main headline -->
  <text x="88" y="218" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="300" fill="#0e0e0c" letter-spacing="-2">Start your</text>
  <text x="88" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="300" fill="#0e0e0c" letter-spacing="-2">family's</text>
  <text x="88" y="422" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="300" fill="#0e0e0c" letter-spacing="-2">thousand-year</text>
  <text x="88" y="524" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="300" fill="#0e0e0c" letter-spacing="-2">thread.</text>

  <!-- Bottom hairline -->
  <line x1="88" y1="556" x2="1112" y2="556" stroke="#0e0e0c" stroke-width="1"/>

  <!-- Bottom left wordmark -->
  <text x="88" y="580" font-family="'Courier New', monospace" font-size="11" fill="#0e0e0c" letter-spacing="4">HEIRLOOM</text>

  <!-- Bottom right URL -->
  <text x="1112" y="580" text-anchor="end" font-family="'Courier New', monospace" font-size="11" fill="rgba(14,14,12,0.38)" letter-spacing="2">heirloom.blue</text>
</svg>
