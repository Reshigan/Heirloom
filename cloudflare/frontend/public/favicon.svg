<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Cosmic Loom mark — bold enough to survive a 16px browser tab. -->
  <rect width="48" height="48" fill="#0e0e0c"/>
  <defs>
    <radialGradient id="n" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cf935a" stop-opacity="0.7"/>
      <stop offset="45%" stop-color="#b07a4a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b07a4a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Eight filaments converging on the node — thick so they read tiny. -->
  <g stroke="#f4ecd8" stroke-width="2.6" stroke-linecap="round" opacity="0.62">
    <line x1="24" y1="8"  x2="24" y2="40"/>
    <line x1="8"  y1="24" x2="40" y2="24"/>
    <line x1="12.7" y1="12.7" x2="35.3" y2="35.3"/>
    <line x1="35.3" y1="12.7" x2="12.7" y2="35.3"/>
  </g>
  <!-- The one emotional colour — the convergence node, glow then core. -->
  <circle cx="24" cy="24" r="11" fill="url(#n)"/>
  <circle cx="24" cy="24" r="4.2" fill="#cf935a"/>
  <circle cx="24" cy="24" r="1.9" fill="#e7b884"/>
</svg>
