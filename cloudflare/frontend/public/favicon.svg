<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Heirloom">
  <defs>
    <!-- White = show tapestry, black = punch through to ink background -->
    <mask id="cutout">
      <rect width="512" height="512" fill="white"/>
      <text x="256" y="268"
            text-anchor="middle" dominant-baseline="central"
            font-family="Georgia, 'Times New Roman', serif"
            font-size="300" font-weight="300"
            fill="black">∞</text>
    </mask>
  </defs>

  <!-- Ink background — visible through the ∞ cutout -->
  <rect width="512" height="512" fill="#0e0e0c"/>

  <!-- Tapestry cloth — masked so ∞ shape is cut out -->
  <g mask="url(#cutout)">

    <!-- Warp hairlines -->
    <g stroke="rgba(244,236,216,0.28)" stroke-width="1">
      <line x1="38"  y1="0" x2="38"  y2="512"/>
      <line x1="80"  y1="0" x2="80"  y2="512"/>
      <line x1="122" y1="0" x2="122" y2="512"/>
      <line x1="164" y1="0" x2="164" y2="512"/>
      <line x1="206" y1="0" x2="206" y2="512"/>
      <line x1="248" y1="0" x2="248" y2="512"/>
      <line x1="290" y1="0" x2="290" y2="512"/>
      <line x1="332" y1="0" x2="332" y2="512"/>
      <line x1="374" y1="0" x2="374" y2="512"/>
      <line x1="416" y1="0" x2="416" y2="512"/>
      <line x1="458" y1="0" x2="458" y2="512"/>
      <line x1="500" y1="0" x2="500" y2="512"/>
    </g>

    <!-- Band 1 — vivid madder red / kermes crimson -->
    <g stroke-linecap="square">
      <line x1="12"  y1="22" x2="98"  y2="22" stroke="#e03428" stroke-width="4.5"/>
      <line x1="142" y1="30" x2="250" y2="30" stroke="#e03428" stroke-width="4.2"/>
      <line x1="54"  y1="38" x2="138" y2="38" stroke="#ec4458" stroke-width="4.8"/>
      <line x1="296" y1="38" x2="414" y2="38" stroke="#e03428" stroke-width="4.2"/>
      <line x1="178" y1="47" x2="268" y2="47" stroke="#ec4458" stroke-width="4.0"/>
      <line x1="0"   y1="55" x2="84"  y2="55" stroke="#e03428" stroke-width="4.5"/>
      <line x1="342" y1="55" x2="468" y2="55" stroke="#e03428" stroke-width="4.2"/>
      <line x1="116" y1="63" x2="220" y2="63" stroke="#ec4458" stroke-width="4.0"/>
      <line x1="60"  y1="72" x2="158" y2="72" stroke="#e03428" stroke-width="4.2"/>
      <line x1="422" y1="72" x2="510" y2="72" stroke="#ec4458" stroke-width="4.0"/>
      <line x1="236" y1="80" x2="364" y2="80" stroke="#e03428" stroke-width="4.5"/>
    </g>

    <!-- Band 2 — vivid saffron gold / weld yellow -->
    <g stroke-linecap="square">
      <line x1="244" y1="104" x2="374" y2="104" stroke="#f4c030" stroke-width="4.2"/>
      <line x1="46"  y1="112" x2="148" y2="112" stroke="#f4c030" stroke-width="4.0"/>
      <line x1="418" y1="112" x2="512" y2="112" stroke="#e8a828" stroke-width="3.8"/>
      <line x1="166" y1="121" x2="268" y2="121" stroke="#e8a828" stroke-width="4.5"/>
      <line x1="0"   y1="130" x2="88"  y2="130" stroke="#f4c030" stroke-width="4.0"/>
      <line x1="342" y1="130" x2="456" y2="130" stroke="#f4c030" stroke-width="4.2"/>
      <line x1="110" y1="139" x2="218" y2="139" stroke="#e8a828" stroke-width="4.0"/>
      <line x1="262" y1="148" x2="378" y2="148" stroke="#f4c030" stroke-width="4.5"/>
      <line x1="34"  y1="156" x2="130" y2="156" stroke="#e8a828" stroke-width="3.8"/>
      <line x1="180" y1="164" x2="298" y2="164" stroke="#f4c030" stroke-width="4.2"/>
      <line x1="472" y1="156" x2="512" y2="156" stroke="#f4c030" stroke-width="4.0"/>
    </g>

    <!-- Band 3 — deep vivid indigo / bright woad blue -->
    <g stroke-linecap="square">
      <line x1="84"  y1="186" x2="198" y2="186" stroke="#2860d0" stroke-width="4.5"/>
      <line x1="260" y1="194" x2="394" y2="194" stroke="#2860d0" stroke-width="4.2"/>
      <line x1="430" y1="194" x2="512" y2="194" stroke="#3a8cc8" stroke-width="4.0"/>
      <line x1="10"  y1="203" x2="106" y2="203" stroke="#3a8cc8" stroke-width="4.2"/>
      <line x1="146" y1="212" x2="264" y2="212" stroke="#2860d0" stroke-width="4.5"/>
      <line x1="340" y1="221" x2="470" y2="221" stroke="#3a8cc8" stroke-width="4.0"/>
      <line x1="56"  y1="230" x2="154" y2="230" stroke="#2860d0" stroke-width="4.2"/>
      <line x1="196" y1="230" x2="298" y2="230" stroke="#3a8cc8" stroke-width="4.0"/>
      <line x1="390" y1="239" x2="512" y2="239" stroke="#2860d0" stroke-width="4.5"/>
      <line x1="80"  y1="248" x2="198" y2="248" stroke="#2860d0" stroke-width="4.2"/>
    </g>

    <!-- Band 4 — deep cochineal crimson / warm madder -->
    <g stroke-linecap="square">
      <line x1="34"  y1="272" x2="148" y2="272" stroke="#c02050" stroke-width="4.5"/>
      <line x1="206" y1="280" x2="318" y2="280" stroke="#e03428" stroke-width="4.0"/>
      <line x1="422" y1="280" x2="512" y2="280" stroke="#c02050" stroke-width="4.2"/>
      <line x1="0"   y1="289" x2="80"  y2="289" stroke="#e03428" stroke-width="4.0"/>
      <line x1="316" y1="289" x2="424" y2="289" stroke="#c02050" stroke-width="4.5"/>
      <line x1="154" y1="298" x2="270" y2="298" stroke="#c02050" stroke-width="4.2"/>
      <line x1="46"  y1="307" x2="160" y2="307" stroke="#c02050" stroke-width="4.0"/>
      <line x1="374" y1="307" x2="494" y2="307" stroke="#e03428" stroke-width="4.5"/>
      <line x1="222" y1="316" x2="350" y2="316" stroke="#c02050" stroke-width="4.2"/>
      <line x1="0"   y1="325" x2="100" y2="325" stroke="#e03428" stroke-width="4.0"/>
      <line x1="410" y1="325" x2="512" y2="325" stroke="#c02050" stroke-width="4.2"/>
    </g>

    <!-- Band 5 — rich weld amber / bright saffron -->
    <g stroke-linecap="square">
      <line x1="60"  y1="356" x2="178" y2="356" stroke="#e8a828" stroke-width="4.5"/>
      <line x1="236" y1="364" x2="358" y2="364" stroke="#f4c030" stroke-width="4.0"/>
      <line x1="410" y1="364" x2="512" y2="364" stroke="#e8a828" stroke-width="4.2"/>
      <line x1="0"   y1="373" x2="94"  y2="373" stroke="#e8a828" stroke-width="4.0"/>
      <line x1="146" y1="382" x2="270" y2="382" stroke="#f4c030" stroke-width="4.5"/>
      <line x1="316" y1="391" x2="450" y2="391" stroke="#e8a828" stroke-width="4.2"/>
      <line x1="24"  y1="400" x2="134" y2="400" stroke="#f4c030" stroke-width="4.0"/>
      <line x1="194" y1="400" x2="310" y2="400" stroke="#e8a828" stroke-width="4.5"/>
      <line x1="440" y1="408" x2="512" y2="408" stroke="#f4c030" stroke-width="4.0"/>
      <line x1="84"  y1="416" x2="206" y2="416" stroke="#f4c030" stroke-width="4.2"/>
      <line x1="274" y1="416" x2="394" y2="416" stroke="#e8a828" stroke-width="4.0"/>
    </g>

    <!-- Band 6 — bright woad sky blue / deep indigo -->
    <g stroke-linecap="square">
      <line x1="146" y1="438" x2="278" y2="438" stroke="#3a8cc8" stroke-width="4.5"/>
      <line x1="10"  y1="446" x2="114" y2="446" stroke="#2860d0" stroke-width="4.2"/>
      <line x1="324" y1="446" x2="460" y2="446" stroke="#3a8cc8" stroke-width="4.0"/>
      <line x1="206" y1="455" x2="338" y2="455" stroke="#2860d0" stroke-width="4.5"/>
      <line x1="0"   y1="464" x2="84"  y2="464" stroke="#3a8cc8" stroke-width="4.2"/>
      <line x1="376" y1="464" x2="512" y2="464" stroke="#2860d0" stroke-width="4.0"/>
      <line x1="120" y1="473" x2="244" y2="473" stroke="#3a8cc8" stroke-width="4.5"/>
      <line x1="266" y1="482" x2="414" y2="482" stroke="#2860d0" stroke-width="4.2"/>
      <line x1="44"  y1="491" x2="160" y2="491" stroke="#3a8cc8" stroke-width="4.0"/>
      <line x1="444" y1="491" x2="512" y2="491" stroke="#2860d0" stroke-width="4.2"/>
    </g>

  </g>
  <!-- No outline — the ∞ cutout speaks for itself -->
</svg>
