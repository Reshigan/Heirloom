<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Heirloom">
  <!-- Simplified mark for browser tab / small sizes — no thread texture -->
  <rect width="512" height="512" fill="#0e0e0c"/>
  <!-- ∞ in warm sealing-wax on ink -->
  <ellipse cx="176" cy="256" rx="96" ry="71" fill="#b07a4a"/>
  <ellipse cx="336" cy="256" rx="96" ry="71" fill="#b07a4a"/>
  <!-- Inner ovals cut back to ink (the loop interiors) -->
  <ellipse cx="176" cy="256" rx="64" ry="38" fill="#0e0e0c"/>
  <ellipse cx="336" cy="256" rx="64" ry="38" fill="#0e0e0c"/>
</svg>
