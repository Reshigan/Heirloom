<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260607" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Heirloom — the family thread that outlives all of us. Append-only, multi-generational, time-locked. Write today. Lock entries for descendants who don't exist yet." />
    <meta name="theme-color" content="#0e0e0c" />
    <title>Heirloom — your family's thousand-year thread</title>

    <!-- Installable PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=20260602" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Heirloom" />
    
    <!-- Heirloom type system (per the Claude Design bundle): Source Serif 4
         (variable optical serif, display + prose), Inter (UI), JetBrains Mono
         (archival). No 4th typeface — the legacy Cinzel/Cormorant/Caveat are
         retired. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,300;1,8..60,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,300;1,8..60,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://heirloom.blue/" />
    <meta property="og:title" content="Heirloom — your family's thousand-year thread" />
    <meta property="og:description" content="Write today. Lock entries for descendants who don't exist yet. Read what came before. The thread continues after you, after us, after the company." />
    <meta property="og:image" content="https://heirloom.blue/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Heirloom" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://heirloom.blue/" />
    <meta name="twitter:title" content="Heirloom — your family's thousand-year thread" />
    <meta name="twitter:description" content="Write today. Lock entries for descendants who don't exist yet. Read what came before. The thread continues after you, after us, after the company." />
    <meta name="twitter:image" content="https://heirloom.blue/og-image.png" />
  </head>
  <body>
    <!-- Cold-boot splash — shown before React hydrates so a standalone
         (home-screen) launch never flashes a blank #0e0e0c. ∞ on ink, a
         hairline warm progress bar, Source Serif 4. No gradient glow.
         Removed by main.tsx (or auto-fades) once the app mounts. -->
    <style>
      #hl-splash {
        position: fixed; inset: 0; z-index: 2147483647;
        background: #0e0e0c; color: #f4ecd8;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: 'Source Serif 4', Georgia, serif; -webkit-font-smoothing: antialiased;
        transition: opacity 360ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      #hl-splash[data-leaving] { opacity: 0; pointer-events: none; }
      #hl-splash .hl-splash-mark { font-size: 64px; line-height: 1; font-weight: 300; color: #b07a4a; }
      #hl-splash .hl-splash-word { margin-top: 22px; font-size: 22px; font-style: italic; font-weight: 400; letter-spacing: -0.01em; color: rgba(244, 236, 216, 0.55); }
      #hl-splash .hl-splash-track { position: absolute; bottom: 96px; left: 20%; right: 20%; height: 1px; background: rgba(176, 122, 74, 0.18); overflow: hidden; }
      #hl-splash .hl-splash-fill { height: 1px; width: 30%; background: #b07a4a; animation: hl-splash-shuttle 1400ms cubic-bezier(0.16, 1, 0.3, 1) infinite; }
      #hl-splash .hl-splash-label { position: absolute; bottom: 64px; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(244, 236, 216, 0.32); }
      @keyframes hl-splash-shuttle { 0% { transform: translateX(-110%); } 100% { transform: translateX(440%); } }
      @media (prefers-reduced-motion: reduce) {
        #hl-splash .hl-splash-fill { animation: none; width: 62%; }
        #hl-splash { transition: none; }
      }
    </style>
    <div id="hl-splash" aria-hidden="true">
      <div class="hl-splash-mark">∞</div>
      <div class="hl-splash-word">Heirloom</div>
      <div class="hl-splash-track"><div class="hl-splash-fill"></div></div>
      <div class="hl-splash-label">opening your cloth</div>
    </div>
    <!-- Splash teardown. MUST be an external file, not inline: the production
         CSP (script-src 'self') blocks inline scripts, which previously left
         this splash covering the whole app. src/main.tsx removes #hl-splash on
         mount (the fast path); splash-boot.js is the load-event safety net. -->
    <script src="/splash-boot.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
