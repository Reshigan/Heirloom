<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260615b" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Heirloom — the family thread that outlives all of us. Append-only, multi-generational, time-locked. Write today. Lock entries for descendants who don't exist yet." />
    <meta name="theme-color" content="#0b0907" />
    <title>Heirloom — your family's thousand-year thread</title>

    <!-- Theme cold-boot — resolve the saved theme onto <html> BEFORE first
         paint so a light-mode visitor never sees the dark splash flash ("the
         old theme"). MUST be synchronous + in <head>, and MUST be external
         (prod CSP `script-src 'self'` blocks inline scripts). -->
    <script src="/theme-boot.js"></script>
    <style>
      /* Root substrate + splash track the resolved theme so the very first
         browser paint already matches (no dark→light flash on the marketing
         page). theme-boot.js sets html[data-theme] before this paints. */
      html { background: #0b0907; }
      html[data-theme="light"] { background: #faf3e4; }
    </style>

    <!-- Installable PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=20260615b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Heirloom" />
    
    <!-- Heirloom type system: Cormorant Garamond (display — headlines, the ∞
         mark, names), Spectral (reading — prose, inputs, long-form), Space Mono
         (archival labels, dates, eyebrows), Inter (residual UI chrome),
         Tangerine (the hand). Cormorant is display-only — it turns unreadable
         below ~24px, so reading copy rides Spectral. The faces are now
         self-hosted via @fontsource (imported in src/main.tsx) — no
         render-blocking third-party font requests. -->

    <link rel="canonical" href="https://heirloom.blue/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://heirloom.blue/" />
    <meta property="og:title" content="Heirloom — your family's thousand-year thread" />
    <meta property="og:description" content="Write today. Lock entries for descendants who don't exist yet. Read what came before. The thread continues after you, after us, after the company." />
    <meta property="og:image" content="https://heirloom.blue/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Heirloom" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://heirloom.blue/" />
    <meta name="twitter:title" content="Heirloom — your family's thousand-year thread" />
    <meta name="twitter:description" content="Write today. Lock entries for descendants who don't exist yet. Read what came before. The thread continues after you, after us, after the company." />
    <meta name="twitter:image" content="https://heirloom.blue/og-image.png" />
  </head>
  <body>
    <!-- Cold-boot splash — shown before React hydrates so a standalone
         (home-screen) launch never flashes a blank ground. ∞ on ground, a
         hairline copper progress bar, Cormorant Garamond. No gradient glow.
         Removed by main.tsx (or auto-fades) once the app mounts. -->
    <style>
      #hl-splash {
        position: fixed; inset: 0; z-index: 2147483647;
        background: #0b0907; color: #f2e6d0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: 'Cormorant Garamond', Georgia, serif; -webkit-font-smoothing: antialiased;
        transition: opacity 360ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      #hl-splash[data-leaving] { opacity: 0; pointer-events: none; }
      #hl-splash .hl-splash-mark { font-size: 72px; line-height: 1; font-weight: 300; color: #e0a062; }
      #hl-splash .hl-splash-word { margin-top: 20px; font-size: 30px; font-style: italic; font-weight: 400; letter-spacing: -0.01em; color: rgba(242, 230, 208, 0.58); }
      #hl-splash .hl-splash-track { position: absolute; bottom: 96px; left: 20%; right: 20%; height: 1px; background: rgba(224, 160, 98, 0.18); overflow: hidden; }
      #hl-splash .hl-splash-fill { height: 1px; width: 30%; background: #e0a062; animation: hl-splash-shuttle 1400ms cubic-bezier(0.16, 1, 0.3, 1) infinite; }
      #hl-splash .hl-splash-label { position: absolute; bottom: 64px; font-family: 'Space Mono', ui-monospace, monospace; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(242, 230, 208, 0.32); }
      /* Light theme — paper splash so a light-mode visitor opens onto bone,
         not a flash of ground. Values mirror .loom[data-theme="light"]. */
      html[data-theme="light"] #hl-splash { background: #faf3e4; color: #120d08; }
      html[data-theme="light"] #hl-splash .hl-splash-mark { color: #a86220; }
      html[data-theme="light"] #hl-splash .hl-splash-word { color: rgba(18, 13, 8, 0.58); }
      html[data-theme="light"] #hl-splash .hl-splash-track { background: rgba(168, 98, 32, 0.18); }
      html[data-theme="light"] #hl-splash .hl-splash-fill { background: #a86220; }
      html[data-theme="light"] #hl-splash .hl-splash-label { color: rgba(18, 13, 8, 0.40); }
      @keyframes hl-splash-shuttle { 0% { transform: translateX(-110%); } 100% { transform: translateX(440%); } }
      @media (prefers-reduced-motion: reduce) {
        #hl-splash .hl-splash-fill { animation: none; width: 62%; }
        #hl-splash { transition: none; }
      }
    </style>
    <div id="hl-splash" aria-hidden="true">
      <div class="hl-splash-mark">∞</div>
      <div class="hl-splash-word">Heirloom</div>
      <div class="hl-splash-track"><div class="hl-splash-fill"></div></div>
      <div class="hl-splash-label">opening your cloth</div>
    </div>
    <!-- Splash teardown. MUST be an external file, not inline: the production
         CSP (script-src 'self') blocks inline scripts, which previously left
         this splash covering the whole app. src/main.tsx removes #hl-splash on
         mount (the fast path); splash-boot.js is the load-event safety net. -->
    <script src="/splash-boot.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
