# Heirloom - Cloudflare Workers Configuration
# https://heirloom.blue

# IMPORTANT: name MUST match the worker bound to api.heirloom.blue/*.
# That binding (per /zones/.../workers/routes) is on script "heirloom",
# not "heirloom-api". Earlier deploys uploaded to "heirloom-api" — a
# parallel worker with no route — which is why production never picked
# up changes from this branch. See DEPLOY.md and the Phase-15 commit.
name = "heirloom"
main = "worker/src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Account settings
account_id = "08596e523c096f04b56d7ae43f7821f4"

# ============================================
# BINDINGS
# ============================================

# D1 Database (SQLite at the edge)
[[d1_databases]]
binding = "DB"
database_name = "heirloom-db"
database_id = "4a228f5e-5ab9-4337-80d7-ebdb4eca0b7d"
migrations_dir = "migrations"

# R2 Storage(S3-compatible, zero egress)
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "heirloom-uploads"

# KV Namespace (for sessions, cache)
[[kv_namespaces]]
binding = "KV"
id = "a95e2aeaffd14f7f8c28ed9645d81b48"

# Durable Objects (for real-time features)
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

# Workers AI (used by routes/ai.ts for Llama 3 text generation)
[ai]
binding = "AI"

# ============================================
# CRON TRIGGERS (Dead Man's Switch)
# ============================================

# Cron triggers for Dead Man's Switch
# NOTE: Set CRON_ENABLED=true via `wrangler secret put CRON_ENABLED` to activate
[triggers]
crons = [
  "0 3 * * *",   # Nightly logical backup to R2 (crons/backup.ts)
  "45 2 * * *",  # Daily growth scoreboard email (crons/daily-scoreboard.ts)
  "0 9 * * *",   # Daily at 9 AM UTC - check for missed check-ins
  "0 20 * * *",  # Daily at 8 PM UTC - enqueue the Listener's daily prompt push
  "0 0 * * SUN", # Weekly on Sunday - send reminder emails
  "0 */12 * * *", # Every 12 hours - regenerate AI prompts cache
  "*/5 * * * *", # Every 5 minutes - process push notification queue
]

# ============================================
# ENVIRONMENT VARIABLES
# ============================================

[vars]
ENVIRONMENT = "production"
APP_URL = "https://heirloom.blue"
API_URL = "https://api.heirloom.blue"
ADMIN_NOTIFICATION_EMAIL = "admin@heirloom.blue"

# Web Push (VAPID). Public key + subject are NOT secret (the public key is sent to
# every browser as the applicationServerKey); the matching private key is the
# VAPID_PRIVATE_KEY secret below. VAPID_PUBLIC_KEY must equal the frontend's
# VITE_VAPID_PUBLIC_KEY (cloudflare/frontend/.env.production).
VAPID_PUBLIC_KEY = "nuiTXfo2MgIaSGqGMtQWPUU31OtXkBe3WT46vuHj-Bz0TfPg_XFvXskqlsZw-As_v0f-7iXtz1pt2TK28OQh-w"
VAPID_SUBJECT = "mailto:admin@heirloom.blue"

# Secrets (set via `wrangler secret put`)
# - JWT_SECRET
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET
# - RESEND_API_KEY (for emails)
# - VAPID_PRIVATE_KEY (Web Push signing key; set in CI from the VAPID_PRIVATE_KEY GH secret)
# - ENCRYPTION_MASTER_KEY

# ============================================
# ENVIRONMENTS
# ============================================

[env.staging]
name = "heirloom-staging"
vars = { ENVIRONMENT = "staging", APP_URL = "https://staging.heirloom.blue" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "heirloom-db-staging"
database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# [[env.staging.r2_buckets]]
# binding = "STORAGE"
# bucket_name = "heirloom-uploads-staging"

[[env.staging.kv_namespaces]]
binding = "KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[env.development]
name = "heirloom-dev"
vars = { ENVIRONMENT = "development", APP_URL = "http://localhost:3000" }

# ============================================
# BUILD & DEPLOY
# ============================================

# [build]
# command = "npm run build"

# Custom domain routes
routes = [
  { pattern = "api.heirloom.blue/*", zone_id = "4f33448ad768746ae4f365abde120f0d" }
]

# Tail workers for logging
# [tail_consumers]
# service = "heirloom-logger"
